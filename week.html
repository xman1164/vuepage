<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>專案追蹤器 — 組員版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f3f0;
  --surface: #ffffff;
  --surface-hover: #fafaf8;
  --border: #e8e5e0;
  --border-light: #f0ede8;
  --text-primary: #1a1816;
  --text-secondary: #6b6560;
  --text-muted: #a09890;
  --accent: #2d5a27;
  --accent-light: #e8f0e6;
  --accent-hover: #234a1f;
  --urgent: #c23616;
  --urgent-bg: #fdf0ed;
  --important: #d4820a;
  --important-bg: #fef8ec;
  --normal: #5a7d9a;
  --normal-bg: #eef4f8;
  --status-not-started: #a09890;
  --status-not-started-bg: #f5f3f0;
  --status-progress: #d4820a;
  --status-progress-bg: #fef8ec;
  --status-done: #2d5a27;
  --status-done-bg: #e8f0e6;
  --status-blocked: #c23616;
  --status-blocked-bg: #fdf0ed;
  --radius: 10px;
  --radius-lg: 14px;
  --shadow-sm: 0 1px 3px rgba(26,24,22,.04);
  --shadow-md: 0 4px 16px rgba(26,24,22,.06);
  --font-display: 'Space Grotesk', 'Noto Sans TC', sans-serif;
  --font-body: 'Noto Sans TC', 'Space Grotesk', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-body); background: var(--bg); color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* ── Animations ── */
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideDown { from { opacity: 0; max-height: 0; overflow: hidden; } to { opacity: 1; max-height: 800px; } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
@keyframes spin { to { transform: rotate(360deg); } }
.fade-up { animation: fadeUp .35s ease-out both; }
.slide-down { animation: slideDown .3s ease-out both; }

/* ── Identity Bar ── */
.identity-overlay { position: fixed; inset: 0; background: rgba(26,24,22,.4); backdrop-filter: blur(8px); z-index: 100; display: flex; align-items: center; justify-content: center; }
.identity-card { background: var(--surface); border-radius: 20px; padding: 40px; max-width: 380px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(26,24,22,.15); }
.identity-card h2 { font-family: var(--font-display); font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.identity-card p { color: var(--text-secondary); font-size: 13px; margin-bottom: 24px; }
.identity-select { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: var(--radius); font-size: 15px; font-family: var(--font-body); background: var(--bg); appearance: none; cursor: pointer; outline: none; }
.identity-select:focus { border-color: var(--accent); }
.identity-enter { width: 100%; margin-top: 14px; padding: 13px; border: none; border-radius: var(--radius); background: var(--accent); color: #fff; font-size: 15px; font-weight: 600; font-family: var(--font-body); cursor: pointer; transition: background .2s; }
.identity-enter:hover { background: var(--accent-hover); }
.identity-enter:disabled { opacity: .4; cursor: not-allowed; }

/* ── Top Bar ── */
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; }
.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-logo { width: 34px; height: 34px; border-radius: 9px; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; font-family: var(--font-display); }
.topbar-title { font-family: var(--font-display); font-size: 16px; font-weight: 700; }
.topbar-user { display: flex; align-items: center; gap: 8px; }
.topbar-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-light); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
.topbar-name { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
.topbar-switch { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 11px; color: var(--text-muted); cursor: pointer; font-family: var(--font-body); }
.topbar-switch:hover { border-color: var(--text-muted); color: var(--text-secondary); }

/* ── Container ── */
.container { max-width: 680px; margin: 0 auto; padding: 20px 16px 80px; }

/* ── Filter Bar ── */
.filter-bar { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
.filter-chip { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1.5px solid var(--border); background: var(--surface); color: var(--text-secondary); cursor: pointer; transition: all .15s; font-family: var(--font-body); }
.filter-chip:hover { border-color: var(--text-muted); }
.filter-chip.active { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }

/* ── Priority Chips ── */
.priority-bar { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.priority-chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1.5px solid var(--border); background: var(--surface); cursor: pointer; transition: all .15s; font-family: var(--font-body); }
.priority-chip.active-urgent { background: var(--urgent-bg); color: var(--urgent); border-color: var(--urgent); }
.priority-chip.active-important { background: var(--important-bg); color: var(--important); border-color: var(--important); }
.priority-chip.active-normal { background: var(--normal-bg); color: var(--normal); border-color: var(--normal); }
.priority-chip.active-all { background: var(--text-primary); color: #fff; border-color: var(--text-primary); }

/* ── Project Card ── */
.project-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 16px; overflow: hidden; box-shadow: var(--shadow-sm); transition: box-shadow .2s; }
.project-card:hover { box-shadow: var(--shadow-md); }
.project-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; cursor: pointer; user-select: none; }
.project-header:hover { background: var(--surface-hover); }
.project-left { display: flex; align-items: center; gap: 10px; flex: 1; }
.project-arrow { font-size: 12px; color: var(--text-muted); width: 18px; transition: transform .2s; }
.project-arrow.open { transform: rotate(90deg); }
.project-name { font-size: 15px; font-weight: 600; }
.priority-tag { font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 500; }
.priority-tag.urgent { background: var(--urgent-bg); color: var(--urgent); }
.priority-tag.important { background: var(--important-bg); color: var(--important); }
.priority-tag.normal { background: var(--normal-bg); color: var(--normal); }
.project-meta { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.meta-badge { font-size: 11px; color: var(--text-muted); background: var(--bg); padding: 2px 8px; border-radius: 6px; }
.meta-badge.warn { color: var(--urgent); background: var(--urgent-bg); }

/* ── Project Progress ── */
.project-progress { padding: 0 16px 12px; display: flex; align-items: center; gap: 10px; }
.progress-track { flex: 1; height: 5px; background: var(--border-light); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width .4s ease; }
.progress-pct { font-size: 12px; font-weight: 600; color: var(--accent); min-width: 36px; text-align: right; }

/* ── Task List ── */
.task-list { padding: 0 12px 12px; }
.task-card { background: var(--bg); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 6px; border-left: 3px solid var(--border); transition: all .2s; }
.task-card:hover { box-shadow: 0 2px 10px rgba(26,24,22,.04); transform: translateY(-1px); }
.task-card.mine { border-left-color: var(--accent); }
.task-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.task-name { font-size: 14px; font-weight: 500; line-height: 1.5; flex: 1; }
.task-desc { font-size: 12px; color: var(--text-secondary); margin-top: 4px; line-height: 1.6; background: var(--surface); padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border-light); }
.task-meta { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
.assignee-tag { font-size: 12px; color: var(--accent); background: var(--accent-light); padding: 2px 8px; border-radius: 6px; }
.due-tag { font-size: 12px; padding: 2px 8px; border-radius: 6px; }
.due-tag.overdue { color: var(--urgent); background: var(--urgent-bg); font-weight: 600; }
.due-tag.soon { color: var(--important); background: var(--important-bg); font-weight: 500; }
.due-tag.normal { color: var(--text-muted); background: var(--bg); }
.task-bottom { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
.status-badge { padding: 3px 10px; border-radius: 16px; font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; cursor: pointer; border: none; font-family: var(--font-body); transition: all .15s; }
.status-badge:hover { filter: brightness(.95); }
.task-actions { display: flex; gap: 4px; flex-shrink: 0; }
.tiny-btn { background: none; border: none; font-size: 13px; padding: 3px 6px; border-radius: 6px; color: var(--text-muted); cursor: pointer; }
.tiny-btn:hover { background: var(--border-light); }
.tiny-btn.danger { color: var(--urgent); background: var(--urgent-bg); font-size: 11px; padding: 3px 8px; font-weight: 500; font-family: var(--font-body); }

/* ── Weekly Note ── */
.weekly-note { margin-top: 8px; }
.weekly-note-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
.weekly-note-text { font-size: 12px; color: var(--text-secondary); background: var(--surface); padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border-light); line-height: 1.5; }
.weekly-note-input { width: 100%; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 12px; font-family: var(--font-body); outline: none; resize: vertical; min-height: 36px; background: var(--surface); }
.weekly-note-input:focus { border-color: var(--accent); }

/* ── Add Task ── */
.add-task-btn { width: 100%; padding: 10px; border-radius: 8px; background: transparent; border: 1.5px dashed var(--border); color: var(--text-muted); font-size: 13px; cursor: pointer; font-family: var(--font-body); transition: all .2s; margin-top: 4px; }
.add-task-btn:hover { border-color: var(--text-muted); color: var(--text-secondary); }
.add-task-form { background: var(--surface); border-radius: var(--radius); padding: 14px; margin-top: 6px; border: 1.5px solid var(--border); }
.form-group { margin-bottom: 10px; }
.form-label { font-size: 11px; color: var(--text-muted); font-weight: 500; margin-bottom: 4px; display: block; }
.form-input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; font-family: var(--font-body); outline: none; background: var(--bg); }
.form-input:focus { border-color: var(--accent); background: var(--surface); }
.form-textarea { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-family: var(--font-body); outline: none; background: var(--bg); resize: vertical; min-height: 60px; }
.form-textarea:focus { border-color: var(--accent); background: var(--surface); }
.form-row { display: flex; gap: 10px; }
.form-col { flex: 1; }
.form-input-sm { width: 100%; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-family: var(--font-body); outline: none; background: var(--bg); }
.form-input-sm:focus { border-color: var(--accent); background: var(--surface); }
.status-picker { display: flex; gap: 6px; flex-wrap: wrap; }
.status-opt { padding: 5px 11px; border-radius: 8px; font-size: 12px; background: var(--bg); color: var(--text-secondary); border: 1.5px solid var(--border); cursor: pointer; font-family: var(--font-body); transition: all .15s; }
.status-opt.active { font-weight: 600; }
.form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
.btn-cancel { padding: 8px 18px; border-radius: 8px; background: var(--bg); color: var(--text-secondary); font-size: 13px; font-weight: 500; border: none; cursor: pointer; font-family: var(--font-body); }
.btn-cancel:hover { background: var(--border); }
.btn-ok { padding: 8px 18px; border-radius: 8px; background: var(--accent); color: #fff; font-size: 13px; font-weight: 500; border: none; cursor: pointer; font-family: var(--font-body); }
.btn-ok:hover { background: var(--accent-hover); }

/* ── Empty ── */
.empty-state { text-align: center; padding: 60px 20px; }
.empty-icon { font-size: 44px; margin-bottom: 12px; }
.empty-text { font-size: 14px; color: var(--text-muted); }

/* ── Loading ── */
.loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
.loading-spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
.loading-text { margin-top: 12px; color: var(--text-muted); font-size: 13px; }

/* ── Toast ── */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text-primary); color: #fff; padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 200; box-shadow: 0 8px 24px rgba(0,0,0,.15); opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }

/* ── Responsive ── */
@media (max-width: 480px) {
  .form-row { flex-direction: column; gap: 8px; }
  .topbar { padding: 12px 14px; }
  .container { padding: 16px 12px 80px; }
}
</style>
</head>
<body>

<div id="app">
  <div class="loading-overlay" id="loading">
    <div class="loading-spinner"></div>
    <p class="loading-text">連線 Firebase 中...</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, collection, doc, getDocs, addDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA31PYM4v853tOEqi7xqwyGigEncDx64mM",
  authDomain: "weekreport-a9e81.firebaseapp.com",
  projectId: "weekreport-a9e81",
  storageBucket: "weekreport-a9e81.firebasestorage.app",
  messagingSenderId: "962006056350",
  appId: "1:962006056350:web:d556a7f6ca34376f27aa8f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ════════════════════════════════
   STATE
   ════════════════════════════════ */
let currentUser = localStorage.getItem("tracker-user") || "";
let projects = [];
let members = [];
let expandedProjects = {};
let addingTaskTo = null;
let editingTask = null;
let deleteConfirm = null;
let editingWeeklyNote = null;
let statusFilter = "all";
let priorityFilter = "all";

const STATUS = [
  { value: "not_started", label: "尚未開始", icon: "○", color: "var(--status-not-started)", bg: "var(--status-not-started-bg)", pct: 0 },
  { value: "in_progress", label: "進行中", icon: "◐", color: "var(--status-progress)", bg: "var(--status-progress-bg)", pct: 50 },
  { value: "done", label: "已完成", icon: "●", color: "var(--status-done)", bg: "var(--status-done-bg)", pct: 100 },
  { value: "blocked", label: "卡關", icon: "✕", color: "var(--status-blocked)", bg: "var(--status-blocked-bg)", pct: 25 },
];

const PRIORITIES = [
  { value: "urgent", label: "🔴 緊急", css: "urgent" },
  { value: "important", label: "🟡 重要", css: "important" },
  { value: "normal", label: "🔵 一般", css: "normal" },
];

function gs(v) { return STATUS.find(s => s.value === v) || STATUS[0]; }
function gp(v) { return PRIORITIES.find(p => p.value === v) || PRIORITIES[2]; }

function dueInfo(dateStr, status) {
  if (status === "done") return dateStr ? { label: "✓ 已完成", cls: "normal" } : null;
  if (!dateStr) return { label: "未設定", cls: "normal" };
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + "T00:00:00");
  const diff = Math.ceil((d - today) / 86400000);
  if (diff < 0) return { label: `逾期 ${-diff} 天`, cls: "overdue" };
  if (diff === 0) return { label: "今天到期", cls: "overdue" };
  if (diff <= 3) return { label: `${diff} 天後到期`, cls: "soon" };
  return { label: `${diff} 天後`, cls: "normal" };
}

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2000);
}

/* ════════════════════════════════
   FIREBASE LISTENERS
   ════════════════════════════════ */
function initListeners() {
  // Members
  onSnapshot(collection(db, "members"), (snap) => {
    members = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    members.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
    render();
  });

  // Projects + tasks (projects collection, tasks as subcollection)
  onSnapshot(query(collection(db, "projects"), orderBy("createdAt", "desc")), (snap) => {
    // For each project, listen to tasks subcollection
    projects = [];
    snap.docs.forEach(d => {
      const proj = { id: d.id, ...d.data(), tasks: [] };
      if (expandedProjects[proj.id] === undefined) expandedProjects[proj.id] = true;
      projects.push(proj);
    });
    // Now listen to tasks for each project
    projects.forEach(proj => {
      onSnapshot(query(collection(db, "projects", proj.id, "tasks"), orderBy("createdAt", "asc")), (taskSnap) => {
        proj.tasks = taskSnap.docs.map(td => ({ id: td.id, ...td.data() }));
        render();
      });
    });
    render();
  });
}

/* ════════════════════════════════
   FIREBASE OPERATIONS
   ════════════════════════════════ */
async function fbAddTask(projId, task) {
  try {
    await addDoc(collection(db, "projects", projId, "tasks"), {
      ...task,
      statusHistory: [{ from: null, to: task.status, at: new Date().toISOString(), by: currentUser }],
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp(),
    });
    toast("已新增工作項目");
  } catch (e) { toast("新增失敗：" + e.message); }
}

async function fbUpdateTask(projId, taskId, updates) {
  try {
    await updateDoc(doc(db, "projects", projId, "tasks", taskId), {
      ...updates,
      updatedAt: serverTimestamp(),
    });
  } catch (e) { toast("更新失敗：" + e.message); }
}

async function fbDeleteTask(projId, taskId) {
  try {
    await deleteDoc(doc(db, "projects", projId, "tasks", taskId));
    toast("已刪除");
  } catch (e) { toast("刪除失敗：" + e.message); }
}

async function fbCycleStatus(projId, task) {
  const order = ["not_started", "in_progress", "done", "blocked"];
  const newStatus = order[(order.indexOf(task.status) + 1) % 4];
  const history = task.statusHistory || [];
  history.push({ from: task.status, to: newStatus, at: new Date().toISOString(), by: currentUser });
  await fbUpdateTask(projId, task.id, { status: newStatus, statusHistory: history });
}

/* ════════════════════════════════
   RENDER
   ════════════════════════════════ */
function render() {
  const appEl = document.getElementById("app");
  if (!currentUser) {
    appEl.innerHTML = renderIdentity();
    return;
  }
  document.getElementById("loading").style.display = "none";

  const allTasks = projects.flatMap(p => p.tasks);
  const counts = STATUS.map(s => ({ ...s, count: allTasks.filter(t => t.status === s.value).length }));
  const overdueCount = allTasks.filter(t => t.status !== "done" && t.due && (dueInfo(t.due, t.status)?.cls === "overdue")).length;

  let filtered = projects;
  if (priorityFilter !== "all") {
    filtered = filtered.filter(p => p.priority === priorityFilter);
  }
  filtered = filtered.map(p => ({
    ...p,
    tasks: statusFilter === "all" ? p.tasks : p.tasks.filter(t => t.status === statusFilter),
  })).filter(p => statusFilter === "all" || p.tasks.length > 0);

  let html = `
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-logo">◈</div>
        <span class="topbar-title">專案追蹤器</span>
      </div>
      <div class="topbar-user">
        <div class="topbar-avatar">${currentUser.charAt(0)}</div>
        <span class="topbar-name">${currentUser}</span>
        <button class="topbar-switch" onclick="switchUser()">切換</button>
      </div>
    </div>
    <div class="container">
  `;

  // Overdue alert
  if (overdueCount > 0) {
    html += `<div style="background:var(--urgent-bg);border:1px solid #fecaca;border-radius:var(--radius);padding:10px 16px;margin-bottom:16px;font-size:13px;color:var(--urgent);" class="fade-up">⚠️ 有 <strong>${overdueCount}</strong> 個工作項目已逾期</div>`;
  }

  // Priority filter
  html += `<div class="priority-bar">
    <button class="priority-chip ${priorityFilter === 'all' ? 'active-all' : ''}" onclick="setPriorityFilter('all')">全部專案</button>
    ${PRIORITIES.map(p => `<button class="priority-chip ${priorityFilter === p.value ? 'active-' + p.css : ''}" onclick="setPriorityFilter('${p.value}')">${p.label}</button>`).join("")}
  </div>`;

  // Status filter
  html += `<div class="filter-bar">
    <button class="filter-chip ${statusFilter === 'all' ? 'active' : ''}" onclick="setStatusFilter('all')">全部 ${allTasks.length}</button>
    ${counts.map(s => `<button class="filter-chip ${statusFilter === s.value ? 'active' : ''}" onclick="setStatusFilter('${s.value}')">${s.icon} ${s.label} ${s.count}</button>`).join("")}
  </div>`;

  // Empty
  if (filtered.length === 0) {
    html += `<div class="empty-state fade-up"><div class="empty-icon">📂</div><p class="empty-text">${statusFilter !== "all" || priorityFilter !== "all" ? "此篩選條件下沒有項目" : "目前沒有專案，請等待管理員建立"}</p></div>`;
  }

  // Projects
  filtered.forEach(proj => {
    const prog = proj.tasks.length ? Math.round(proj.tasks.reduce((s, t) => s + gs(t.status).pct, 0) / proj.tasks.length) : 0;
    const done = proj.tasks.filter(t => t.status === "done").length;
    const blocked = proj.tasks.filter(t => t.status === "blocked").length;
    const isOpen = expandedProjects[proj.id] !== false;
    const pri = gp(proj.priority);

    html += `<div class="project-card fade-up">`;
    html += `<div class="project-header" onclick="toggleProject('${proj.id}')">
      <div class="project-left">
        <span class="project-arrow ${isOpen ? 'open' : ''}">▶</span>
        <span class="project-name">${esc(proj.name)}</span>
        <span class="priority-tag ${pri.css}">${pri.label}</span>
      </div>
      <div class="project-meta">
        ${proj.tasks.length ? `<span class="meta-badge">${done}/${proj.tasks.length}</span>` : ""}
        ${blocked > 0 ? `<span class="meta-badge warn">✕${blocked}</span>` : ""}
      </div>
    </div>`;

    if (proj.tasks.length > 0) {
      html += `<div class="project-progress">
        <div class="progress-track"><div class="progress-fill" style="width:${prog}%"></div></div>
        <span class="progress-pct">${prog}%</span>
      </div>`;
    }

    if (isOpen) {
      html += `<div class="task-list">`;
      proj.tasks.forEach(task => {
        const s = gs(task.status);
        const isMine = task.assignee === currentUser;
        const di = dueInfo(task.due, task.status);
        const isEditing = editingTask && editingTask.projId === proj.id && editingTask.taskId === task.id;
        const isEditingNote = editingWeeklyNote && editingWeeklyNote.projId === proj.id && editingWeeklyNote.taskId === task.id;

        html += `<div class="task-card ${isMine ? 'mine' : ''}" style="border-left-color:${s.color}">`;

        if (isEditing) {
          html += renderEditForm(proj.id, task);
        } else {
          html += `<div class="task-top">
            <div style="flex:1">
              <span class="task-name">${esc(task.text)}</span>
              ${task.description ? `<div class="task-desc">${esc(task.description)}</div>` : ""}
              <div class="task-meta">
                ${task.assignee ? `<span class="assignee-tag">👤 ${esc(task.assignee)}</span>` : ""}
                ${di ? `<span class="due-tag ${di.cls}">📅 ${di.label}</span>` : ""}
              </div>
            </div>
            ${isMine ? `<div class="task-actions">
              <button class="tiny-btn" onclick="startEdit('${proj.id}','${task.id}')">✏️</button>
              ${deleteConfirm === task.id
                ? `<button class="tiny-btn danger" onclick="doDeleteTask('${proj.id}','${task.id}')">刪除</button><button class="tiny-btn" onclick="cancelDelete()">取消</button>`
                : `<button class="tiny-btn" onclick="confirmDelete('${task.id}')">🗑</button>`}
            </div>` : ""}
          </div>`;

          html += `<div class="task-bottom">
            ${isMine
              ? `<button class="status-badge" style="background:${s.bg};color:${s.color};border:1.5px solid ${s.color}30" onclick="cycleStatus('${proj.id}','${task.id}')"><span style="font-size:10px">${s.icon}</span>${s.label}</button>`
              : `<span class="status-badge" style="background:${s.bg};color:${s.color};border:1.5px solid ${s.color}30;cursor:default"><span style="font-size:10px">${s.icon}</span>${s.label}</span>`}
            <div class="progress-track"><div class="progress-fill" style="width:${s.pct}%;background:${s.color}"></div></div>
            <span style="font-size:12px;font-weight:600;color:${s.color};min-width:30px;text-align:right">${s.pct}%</span>
          </div>`;

          // Weekly note
          if (isMine) {
            if (isEditingNote) {
              html += `<div class="weekly-note">
                <label class="form-label">📝 本週進度備註</label>
                <textarea class="weekly-note-input" id="weeklyNoteInput" placeholder="本週做了什麼、遇到什麼問題...">${esc(task.weeklyNote || "")}</textarea>
                <div class="form-actions" style="margin-top:6px">
                  <button class="btn-cancel" onclick="cancelWeeklyNote()">取消</button>
                  <button class="btn-ok" onclick="saveWeeklyNote('${proj.id}','${task.id}')">儲存</button>
                </div>
              </div>`;
            } else {
              html += `<div class="weekly-note" style="cursor:pointer" onclick="startWeeklyNote('${proj.id}','${task.id}')">
                <span class="weekly-note-label">📝 本週備註 ${task.weeklyNote ? "" : "(點擊新增)"}</span>
                ${task.weeklyNote ? `<div class="weekly-note-text">${esc(task.weeklyNote)}</div>` : ""}
              </div>`;
            }
          } else if (task.weeklyNote) {
            html += `<div class="weekly-note">
              <span class="weekly-note-label">📝 本週備註</span>
              <div class="weekly-note-text">${esc(task.weeklyNote)}</div>
            </div>`;
          }
        }
        html += `</div>`;
      });

      // Add task button (only for own tasks)
      if (addingTaskTo === proj.id) {
        html += renderAddForm(proj.id);
      } else {
        html += `<button class="add-task-btn" onclick="startAddTask('${proj.id}')">+ 新增我的工作項目</button>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  });

  html += `</div>`;
  appEl.innerHTML = html;
}

function renderIdentity() {
  const opts = members.length > 0
    ? members.map(m => `<option value="${esc(m.name)}">${esc(m.name)}</option>`).join("")
    : `<option value="" disabled>載入組員中...</option>`;

  return `
    <div class="identity-overlay">
      <div class="identity-card fade-up">
        <h2>👋 你好</h2>
        <p>選擇你的身份，開始更新工作進度</p>
        <select class="identity-select" id="identitySelect">
          <option value="">— 請選擇 —</option>
          ${opts}
        </select>
        <button class="identity-enter" id="identityEnter" disabled onclick="enterApp()">進入</button>
      </div>
    </div>
    <script>
      document.getElementById("identitySelect")?.addEventListener("change", function() {
        document.getElementById("identityEnter").disabled = !this.value;
      });
    <\/script>
  `;
}

function renderEditForm(projId, task) {
  return `<div class="add-task-form slide-down">
    <div class="form-group">
      <label class="form-label">工作項目名稱</label>
      <input class="form-input" id="editText" value="${esc(task.text)}">
    </div>
    <div class="form-group">
      <label class="form-label">描述說明</label>
      <textarea class="form-textarea" id="editDesc" placeholder="詳細內容、注意事項、相關連結...">${esc(task.description || "")}</textarea>
    </div>
    <div class="form-row">
      <div class="form-col">
        <label class="form-label">預計完成</label>
        <input type="date" class="form-input-sm" id="editDue" value="${task.due || ""}">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">狀態</label>
      <div class="status-picker">
        ${STATUS.map(s => `<button class="status-opt ${task.status === s.value ? 'active' : ''}" style="${task.status === s.value ? `background:${s.bg};color:${s.color};border-color:${s.color}` : ''}" onclick="setEditStatus('${s.value}')">${s.icon} ${s.label}</button>`).join("")}
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="cancelEdit()">取消</button>
      <button class="btn-ok" onclick="saveEdit('${projId}','${task.id}','${task.status}')">儲存</button>
    </div>
  </div>`;
}

function renderAddForm(projId) {
  return `<div class="add-task-form slide-down">
    <div class="form-group">
      <label class="form-label">工作項目名稱</label>
      <input class="form-input" id="newTaskText" placeholder="例：設計首頁 wireframe" autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">描述說明（選填）</label>
      <textarea class="form-textarea" id="newTaskDesc" placeholder="詳細內容、注意事項..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-col">
        <label class="form-label">預計完成</label>
        <input type="date" class="form-input-sm" id="newTaskDue">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">狀態</label>
      <div class="status-picker" id="newStatusPicker">
        ${STATUS.map(s => `<button class="status-opt ${s.value === 'not_started' ? 'active' : ''}" style="${s.value === 'not_started' ? `background:${s.bg};color:${s.color};border-color:${s.color}` : ''}" onclick="setNewStatus('${s.value}')">${s.icon} ${s.label}</button>`).join("")}
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="cancelAddTask()">完成</button>
      <button class="btn-ok" onclick="doAddTask('${projId}')">新增</button>
    </div>
    <p style="font-size:12px;color:var(--text-muted);text-align:center;margin-top:4px">💡 可連續新增，按「完成」關閉</p>
  </div>`;
}

function esc(str) { if (!str) return ""; const d = document.createElement("div"); d.textContent = str; return d.innerHTML; }

/* ════════════════════════════════
   UI HANDLERS
   ════════════════════════════════ */
let newTaskStatus = "not_started";
let editTaskStatus = "";

window.enterApp = function() {
  const sel = document.getElementById("identitySelect");
  if (sel && sel.value) {
    currentUser = sel.value;
    localStorage.setItem("tracker-user", currentUser);
    render();
  }
};

window.switchUser = function() {
  currentUser = "";
  localStorage.removeItem("tracker-user");
  render();
};

window.toggleProject = function(id) {
  expandedProjects[id] = expandedProjects[id] === false ? true : false;
  render();
};

window.setStatusFilter = function(v) { statusFilter = v; render(); };
window.setPriorityFilter = function(v) { priorityFilter = v; render(); };

window.startAddTask = function(projId) { addingTaskTo = projId; newTaskStatus = "not_started"; render(); };
window.cancelAddTask = function() { addingTaskTo = null; render(); };

window.setNewStatus = function(v) {
  newTaskStatus = v;
  document.querySelectorAll("#newStatusPicker .status-opt").forEach(btn => {
    const sv = btn.textContent.includes("尚未") ? "not_started" : btn.textContent.includes("進行") ? "in_progress" : btn.textContent.includes("已完") ? "done" : "blocked";
    const s = gs(sv);
    if (sv === v) { btn.classList.add("active"); btn.style.background = s.bg; btn.style.color = s.color; btn.style.borderColor = s.color; }
    else { btn.classList.remove("active"); btn.style.background = ""; btn.style.color = ""; btn.style.borderColor = ""; }
  });
};

window.doAddTask = async function(projId) {
  const text = document.getElementById("newTaskText")?.value?.trim();
  if (!text) return toast("請輸入工作項目名稱");
  const desc = document.getElementById("newTaskDesc")?.value?.trim() || "";
  const due = document.getElementById("newTaskDue")?.value || "";
  await fbAddTask(projId, { text, description: desc, assignee: currentUser, due, status: newTaskStatus, weeklyNote: "" });
  document.getElementById("newTaskText").value = "";
  document.getElementById("newTaskDesc").value = "";
  document.getElementById("newTaskDue").value = "";
  newTaskStatus = "not_started";
};

window.startEdit = function(projId, taskId) {
  const proj = projects.find(p => p.id === projId);
  const task = proj?.tasks.find(t => t.id === taskId);
  if (!task) return;
  editingTask = { projId, taskId };
  editTaskStatus = task.status;
  render();
};

window.cancelEdit = function() { editingTask = null; render(); };

window.setEditStatus = function(v) { editTaskStatus = v; render(); };

window.saveEdit = async function(projId, taskId, oldStatus) {
  const text = document.getElementById("editText")?.value?.trim();
  if (!text) return toast("名稱不能為空");
  const desc = document.getElementById("editDesc")?.value?.trim() || "";
  const due = document.getElementById("editDue")?.value || "";
  const task = projects.find(p => p.id === projId)?.tasks.find(t => t.id === taskId);
  const updates = { text, description: desc, due, status: editTaskStatus };
  if (oldStatus !== editTaskStatus && task) {
    const history = task.statusHistory || [];
    history.push({ from: oldStatus, to: editTaskStatus, at: new Date().toISOString(), by: currentUser });
    updates.statusHistory = history;
  }
  await fbUpdateTask(projId, taskId, updates);
  editingTask = null;
  toast("已更新");
  render();
};

window.confirmDelete = function(id) { deleteConfirm = id; render(); };
window.cancelDelete = function() { deleteConfirm = null; render(); };
window.doDeleteTask = async function(projId, taskId) { await fbDeleteTask(projId, taskId); deleteConfirm = null; };

window.cycleStatus = async function(projId, taskId) {
  const proj = projects.find(p => p.id === projId);
  const task = proj?.tasks.find(t => t.id === taskId);
  if (!task || task.assignee !== currentUser) return;
  await fbCycleStatus(projId, task);
};

window.startWeeklyNote = function(projId, taskId) {
  editingWeeklyNote = { projId, taskId };
  render();
  setTimeout(() => document.getElementById("weeklyNoteInput")?.focus(), 50);
};
window.cancelWeeklyNote = function() { editingWeeklyNote = null; render(); };
window.saveWeeklyNote = async function(projId, taskId) {
  const note = document.getElementById("weeklyNoteInput")?.value?.trim() || "";
  await fbUpdateTask(projId, taskId, { weeklyNote: note, weeklyNoteUpdatedAt: new Date().toISOString() });
  editingWeeklyNote = null;
  toast("備註已儲存");
};

/* ════════════════════════════════
   INIT
   ════════════════════════════════ */
initListeners();
setTimeout(() => {
  document.getElementById("loading").style.display = "none";
  if (!currentUser) render();
}, 2000);

</script>
</body>
</html>
